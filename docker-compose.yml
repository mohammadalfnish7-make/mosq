services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mosq
      POSTGRES_PASSWORD: mosq
      POSTGRES_DB: mosq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://mosq:mosq@db:5432/mosq?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres-data:
